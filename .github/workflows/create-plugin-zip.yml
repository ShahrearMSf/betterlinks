# Builds the BetterLinks plugin zip using the 10up action and uploads it as
# a short-lived artifact.
#
# Triggers:
#   - push / pull_request: runs automatically so every change has a build
#     available for download.
#   - workflow_dispatch: manual one-off build with an explicit `ref`.
#   - workflow_call: called by qa.yml + every other QA workflow's
#     self-build fallback so the zip is built once per invocation.

name: QA - Create Plugin Zip

permissions: read-all

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch / tag / SHA to build"
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      ref:
        description: "Branch / tag / SHA to build (defaults to the calling workflow's ref)"
        required: false
        type: string
        default: ""
    outputs:
      artifact-name:
        description: "The name of the uploaded artifact"
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  build:
    name: Build plugin zip
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      artifact-name: ${{ steps.upload-plugin-artifact.outputs.artifact-name }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref || github.ref }}

    - name: Generate zip
      id: upload-plugin-artifact
      uses: 10up/action-wordpress-plugin-build-zip@stable
      with:
        retention-days: 3
