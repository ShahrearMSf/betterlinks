# BetterLinks Free — E2E Tests
#
# Runs Playwright end-to-end tests against a fresh WordPress install with a
# freshly-built BetterLinks (free) plugin.
#
# How it runs:
#   - Standalone via workflow_dispatch: builds the plugin from the selected
#     branch, then runs the tests.
#   - Via workflow_call (from qa.yml): reuses the artifact produced by the
#     shared `build` job and skips its own build.
#
# The environment-independent test suite lives at ShahrearMSf/bl-free-e2e.

name: QA - BetterLinks Free E2E

permissions: read-all

on:
  workflow_dispatch:
    inputs:
      bl_branch:
        description: "BetterLinks branch / tag / SHA to test"
        required: true
        default: "master"
        type: string
  workflow_call:
    inputs:
      artifact-name:
        description: "Pre-built plugin artifact name from create-plugin-zip"
        required: true
        type: string

concurrency:
  group: "bl-free-e2e-${{ github.ref }}"
  cancel-in-progress: true

env:
  WP_DIR: /tmp/wordpress
  WP_PORT: 8080
  DB_NAME: wordpress_test
  DB_USER: root
  DB_PASS: root
  DB_HOST: 127.0.0.1
  ADMIN_USER: admin
  ADMIN_PASS: admin
  ADMIN_EMAIL: admin@test.local

jobs:
  # Only runs on standalone workflow_dispatch when no artifact-name is supplied.
  # When called from qa.yml with an existing artifact, this job is skipped.
  build-plugin:
    if: ${{ inputs.artifact-name == '' }}
    uses: ./.github/workflows/create-plugin-zip.yml
    with:
      ref: ${{ inputs.bl_branch }}

  e2e-test:
    name: "E2E Tests"
    needs: [build-plugin]
    # Run whether build-plugin ran (standalone) or was skipped (qa.yml call).
    if: ${{ !cancelled() && !failure() }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # 1. Download the plugin artifact — either the one built by build-plugin
      #    above, or the one passed in by qa.yml via inputs.artifact-name.
      - name: Download Built BetterLinks
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name || needs.build-plugin.outputs.artifact-name }}
          path: ./betterlinks-dist

      # 2. Clone the environment-independent free e2e suite
      - name: Checkout E2E test suite
        uses: actions/checkout@v4
        with:
          repository: ShahrearMSf/bl-free-e2e
          ref: main
          path: e2e-suite

      # 3. Setup Node.js + PHP + WP-CLI
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mysqli, mbstring, xml, curl, zip, intl, gd, dom, simplexml
          tools: wp-cli

      # 4. Download + configure WordPress
      - name: Download & configure WordPress
        run: |
          wp core download --path="$WP_DIR"

          wp config create \
            --path="$WP_DIR" \
            --dbname="$DB_NAME" \
            --dbuser="$DB_USER" \
            --dbpass="$DB_PASS" \
            --dbhost="$DB_HOST" \
            --extra-php <<'PHP'
          define('WP_DEBUG', true);
          define('WP_DEBUG_LOG', true);
          define('WP_DEBUG_DISPLAY', false);
          define('DISABLE_WP_CRON', true);
          PHP

          wp core install \
            --path="$WP_DIR" \
            --url="http://localhost:${WP_PORT}" \
            --title="BL E2E Test Site" \
            --admin_user="$ADMIN_USER" \
            --admin_password="$ADMIN_PASS" \
            --admin_email="$ADMIN_EMAIL" \
            --skip-email

          wp rewrite structure '/%postname%/' --path="$WP_DIR"
          wp rewrite flush --path="$WP_DIR"

      # 5. Install BetterLinks plugin — same smart detection as pcp / compat.
      - name: Install BetterLinks plugin
        run: |
          ZIP_FILE=$(find ./betterlinks-dist -maxdepth 2 -name "*.zip" | head -n 1)

          if [ -n "$ZIP_FILE" ]; then
            echo "Installing from zip: $ZIP_FILE"
            wp plugin install "$(realpath "$ZIP_FILE")" --path="$WP_DIR"
          else
            echo "No zip found — falling back to directory copy"
            PLUGIN_SRC=$(find ./betterlinks-dist -maxdepth 1 -mindepth 1 -type d | head -n 1)
            [ -z "$PLUGIN_SRC" ] && PLUGIN_SRC="./betterlinks-dist"
            mkdir -p "$WP_DIR/wp-content/plugins/betterlinks"
            cp -r "$PLUGIN_SRC/." "$WP_DIR/wp-content/plugins/betterlinks/"
          fi

          echo "Plugin directory contents:"
          ls "$WP_DIR/wp-content/plugins/betterlinks" | head -n 15

          wp plugin activate betterlinks --path="$WP_DIR"
          wp plugin list --status=active --path="$WP_DIR"

      # 6. Seed minimal content
      - name: Seed minimal test content
        run: |
          WP="wp --path=$WP_DIR"
          $WP option update fresh_site 0
          $WP transient delete --all
          $WP user meta update 1 admin_email_lifespan 9999999999

          $WP post create --post_type=post --post_status=publish \
            --post_title="Sample Post 1" \
            --post_content="<p>Visit <a href=\"https://example.com\">Example</a> for more info.</p>" \
            --porcelain
          $WP post create --post_type=post --post_status=publish \
            --post_title="Sample Post 2" \
            --post_content="<p>Check out WordPress and its many plugins.</p>" \
            --porcelain

          mkdir -p "$WP_DIR/wp-content/uploads/betterlinks_uploads"
          chmod -R 775 "$WP_DIR/wp-content/uploads"

      # 7. Start PHP server
      - name: Start PHP server
        run: |
          cd "$WP_DIR"
          php -S 0.0.0.0:${WP_PORT} &
          for i in $(seq 1 30); do
            curl -s -o /dev/null "http://localhost:${WP_PORT}" && break
            sleep 1
          done
          echo "WordPress ready at http://localhost:${WP_PORT}"

      # 8. Sanity check
      - name: Verify WordPress is accessible
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:${WP_PORT}/wp-login.php")
          echo "wp-login returned: $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 400 ]; then
            echo "WordPress is not accessible!"
            exit 1
          fi

      # 9. Install + run Playwright
      - name: Install E2E dependencies
        working-directory: e2e-suite
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Prepare test directories
        working-directory: e2e-suite
        run: mkdir -p snapshots playwright/.auth

      - name: Run Playwright E2E tests (Free only)
        id: test-run
        continue-on-error: true
        working-directory: e2e-suite
        run: npx playwright test --project=auth-setup --project=free
        env:
          BASE_URL: "http://localhost:8080"
          ADMIN_USER: admin
          ADMIN_PASS: admin

      # 10. Upload artifacts + set status
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e-suite/playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: e2e-suite/test-results/
          retention-days: 14

      - name: Upload WP debug log
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: wp-debug-log
          path: /tmp/wordpress/wp-content/debug.log
          retention-days: 7

      - name: Set job status
        if: always()
        run: |
          if [ "${{ steps.test-run.outcome }}" == "failure" ]; then
            echo "E2E tests failed"
            exit 1
          fi
