name: BetterLinks Free — E2E Tests

on:
  workflow_dispatch:
    inputs:
      bl_branch:
        description: "BetterLinks branch / tag / SHA to test"
        required: true
        default: "master"
        type: string
      wp_version:
        description: "WordPress version"
        required: false
        default: "latest"
        type: string
  workflow_call:
    inputs:
      artifact-name:
        required: true
        type: string
        description: "Pre-built plugin artifact name from create-plugin-zip"
      wp_version:
        required: false
        type: string
        default: "latest"

permissions:
  contents: read

concurrency:
  group: "bl-free-e2e-${{ github.ref }}"
  cancel-in-progress: true

env:
  WP_DIR: /tmp/wordpress
  WP_PORT: 8080
  DB_NAME: wordpress_test
  DB_USER: root
  DB_PASS: root
  DB_HOST: 127.0.0.1
  ADMIN_USER: admin
  ADMIN_PASS: admin
  ADMIN_EMAIL: admin@test.local

jobs:
  # Build plugin from source when invoked directly (workflow_dispatch).
  # When called from qa.yml, this is skipped and the artifact-name input is used instead.
  build-plugin:
    if: ${{ inputs.artifact-name == '' }}
    uses: ./.github/workflows/create-plugin-zip.yml
    with:
      ref: ${{ inputs.bl_branch }}

  e2e-test:
    name: "E2E Tests (WP ${{ inputs.wp_version || 'latest' }})"
    needs: [build-plugin]
    if: ${{ !cancelled() && !failure() }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name || 'betterlinks' }}
          path: betterlinks-plugin

      - name: Checkout E2E test suite
        uses: actions/checkout@v4
        with:
          # Environment-independent free-only suite.
          # Repo: ShahrearMSf/bl-free-e2e
          repository: ShahrearMSf/bl-free-e2e
          ref: main
          path: e2e-suite

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mysqli, mbstring, xml, curl, zip, intl, gd, dom, simplexml
          tools: wp-cli

      - name: Download & configure WordPress
        run: |
          wp core download --path="$WP_DIR" --version="${{ inputs.wp_version || 'latest' }}"

          wp config create \
            --path="$WP_DIR" \
            --dbname="$DB_NAME" \
            --dbuser="$DB_USER" \
            --dbpass="$DB_PASS" \
            --dbhost="$DB_HOST" \
            --extra-php <<'PHP'
          define('WP_DEBUG', true);
          define('WP_DEBUG_LOG', true);
          define('WP_DEBUG_DISPLAY', false);
          define('DISABLE_WP_CRON', true);
          PHP

          wp core install \
            --path="$WP_DIR" \
            --url="http://localhost:${WP_PORT}" \
            --title="BL E2E Test Site" \
            --admin_user="$ADMIN_USER" \
            --admin_password="$ADMIN_PASS" \
            --admin_email="$ADMIN_EMAIL" \
            --skip-email

          # BetterLinks uses its own rewrite prefix (/<slug>/<short>) — pretty permalinks required.
          wp rewrite structure '/%postname%/' --path="$WP_DIR"
          wp rewrite flush --path="$WP_DIR"

      - name: Install BetterLinks plugin
        run: |
          mkdir -p "$WP_DIR/wp-content/plugins/betterlinks"
          cp -r betterlinks-plugin/* "$WP_DIR/wp-content/plugins/betterlinks/"

          # Use wp-cli activate (it handles WP's bootstrapping correctly and
          # avoids raw serialization mistakes like s:N length mismatches).
          wp plugin activate betterlinks --path="$WP_DIR"

          echo "--- Active plugins ---"
          wp plugin list --status=active --path="$WP_DIR"

      - name: Seed minimal test content
        run: |
          WP="wp --path=$WP_DIR"

          # Dismiss admin nags that can interfere with test flow
          $WP option update fresh_site 0
          $WP transient delete --all
          $WP user meta update 1 admin_email_lifespan 9999999999

          # A few sample posts — useful for Link Scanner and Auto-Link feature paths
          $WP post create --post_type=post --post_status=publish \
            --post_title="Sample Post 1" \
            --post_content="<p>Visit <a href=\"https://example.com\">Example</a> for more info.</p>" \
            --porcelain
          $WP post create --post_type=post --post_status=publish \
            --post_title="Sample Post 2" \
            --post_content="<p>Check out WordPress and its many plugins.</p>" \
            --porcelain

          # Ensure BetterLinks upload dir exists (plugin creates it on activation, but belt-and-braces)
          mkdir -p "$WP_DIR/wp-content/uploads/betterlinks_uploads"
          chmod -R 775 "$WP_DIR/wp-content/uploads"

      - name: Start PHP server
        run: |
          cd "$WP_DIR"
          php -S 0.0.0.0:${WP_PORT} &
          for i in $(seq 1 30); do
            curl -s -o /dev/null "http://localhost:${WP_PORT}" && break
            sleep 1
          done
          echo "WordPress ready at http://localhost:${WP_PORT}"

      - name: Verify WordPress + BetterLinks are accessible
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:${WP_PORT}/wp-login.php")
          echo "wp-login returned: $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 400 ]; then
            echo "WordPress is not accessible!"
            exit 1
          fi

      - name: Install E2E dependencies
        working-directory: e2e-suite
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Prepare test directories
        working-directory: e2e-suite
        run: mkdir -p snapshots playwright/.auth

      - name: Run Playwright E2E tests (Free only)
        id: test-run
        continue-on-error: true
        working-directory: e2e-suite
        run: npx playwright test --project=auth-setup --project=free
        env:
          BASE_URL: "http://localhost:8080"
          ADMIN_USER: admin
          ADMIN_PASS: admin

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e-suite/playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: e2e-suite/test-results/
          retention-days: 14

      - name: Upload WP debug log
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: wp-debug-log
          path: /tmp/wordpress/wp-content/debug.log
          retention-days: 7

      - name: Set job status
        if: always()
        run: |
          if [ "${{ steps.test-run.outcome }}" == "failure" ]; then
            echo "E2E tests failed"
            exit 1
          fi
